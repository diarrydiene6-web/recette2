name: recette
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Hive CE (Community Edition) : fork maintenu de Hive, compatible avec
  # les versions récentes de source_gen / json_annotation / json_serializable.
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4

  flutter_riverpod: ^3.3.2
  path_provider: ^2.1.6
  json_annotation: ^4.12.0

  # Sqflite : base de données SQLite locale, utilisée ici pour
  # l'historique et les favoris de recettes consultées.
  sqflite: ^2.3.0
  path: ^1.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/json/